html,

html,
body {
  width: 100%;

}
 
.loading {
  width: 100%;
  height: 100%;
  position: relative;
}
 
.loading i {
  margin: auto;
  position: absolute;
  top: calc(50% - 40px);
  left: calc(50% - 40px);
  width: 80px;
  height: 80px;
  display: block;
}
 
.loading span {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
}
 
.loading span:after {
  content: "";
  display: block;
  position: absolute;
  left: 0px;
  top: 0px;
  width: 10px;
  height: 10px;
  background: var(--main, #00baff);
  border-radius: 50%;
}
 
.loading span:nth-child(1) {
  animation: i1 5.5s 0.2s infinite;
}
 
.loading span:nth-child(2) {
  animation: i2 5.5s 0.4s infinite;
}
 
.loading span:nth-child(3) {

}
 
.loading span:nth-child(4) {

.loading span:nth-child(5) {

}
 
.loading span:nth-child(6) {
